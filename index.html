<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת אגרון - Dark Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151921;
            --input-bg: #1c222d;
            --text-main: #e1e1e1;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #2d3748;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--accent);
        }

        .search-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .file-label {
            display: block;
            text-align: center;
            padding: 10px;
            background: #1e293b;
            border: 1px dashed var(--border);
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-dim);
        }

        .result-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: white;
        }

        .result-info {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .age-pill {
            display: inline-block;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
        }

        .family-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px;
            margin-top: 12px;
            font-size: 13px;
        }

        .family-list {
            display: none;
            margin-top: 12px;
            padding: 12px;
            background: var(--bg-color);
            border-radius: 8px;
            font-size: 13px;
            border-left: 2px solid var(--accent);
        }

        #status {
            text-align: center;
            font-size: 12px;
            margin-bottom: 15px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>AGRON SYSTEM</h1>
    </div>

    <div class="search-card">
        <label class="file-label" id="fileLabel">
            📁 לחץ לטעינת קובץ המאגר (agron.db)
            <input type="file" id="dbFile" accept=".db" style="display:none" onchange="loadDB(this)">
        </label>
        <div id="status">ממתין לטעינת נתונים...</div>

        <div class="input-group"><input type="text" id="inID" placeholder="מספר זהות"></div>
        <div class="input-group"><input type="text" id="inFN" placeholder="שם פרטי"></div>
        <div class="input-group"><input type="text" id="inLN" placeholder="שם משפחה"></div>
        <div class="input-group"><input type="text" id="inCity" placeholder="עיר"></div>
        
        <button onclick="doSearch()">חפש עכשיו</button>
    </div>

    <div id="results"></div>
</div>

<script>
    let db = null;

    async function loadDB(input) {
        if (!input.files[0]) return;
        const status = document.getElementById('status');
        const label = document.getElementById('fileLabel');
        status.innerText = "טוען... נא להמתין";
        
        try {
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
            const reader = new FileReader();
            reader.onload = function() {
                db = new SQL.Database(new Uint8Array(reader.result));
                status.innerText = "✅ המאגר נטען בהצלחה";
                label.style.borderColor = "var(--accent)";
                label.innerText = "✅ קובץ טעון: " + input.files[0].name;
            };
            reader.readAsArrayBuffer(input.files[0]);
        } catch (e) {
            status.innerText = "שגיאה: " + e.message;
        }
    }

    function doSearch() {
        if (!db) { alert("אנא טען את קובץ ה-db תחילה"); return; }
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "";

        const id = document.getElementById('inID').value;
        const fn = document.getElementById('inFN').value;
        const ln = document.getElementById('inLN').value;
        const city = document.getElementById('inCity').value;

        let q = "SELECT * FROM people WHERE 1=1";
        if(id) q += ` AND זהות = '${id}'`;
        if(fn) q += ` AND פרטי LIKE '${fn}%'`;
        if(ln) q += ` AND משפחה LIKE '${ln}%'`;
        if(city) q += ` AND עיר LIKE '${city}%'`;
        q += " LIMIT 50";

        const res = db.exec(q);
        if(!res[0]) { resDiv.innerHTML = "<p style='text-align:center'>לא נמצאו תוצאות</p>"; return; }

        res[0].values.forEach(row => {
            let p = {};
            res[0].columns.forEach((c, i) => p[c] = row[i]);
            const age = 2026 - (parseInt(p.שנה) || 0);

            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="result-name">${p.פרטי} ${p.משפחה}</div>
                <div class="result-info">
                    <b>ת.ז:</b> ${p.זהות} | <b>עיר:</b> ${p.עיר}<br>
                    <b>נולד ב:</b> ${p.שנה} <span class="age-pill">בן/בת ${age}</span>
                </div>
                <button class="family-btn" onclick="getFamily('${p.זהות}', '${p.מז_אב}', '${p.מז_אם}', this)">בני משפחה ▼</button>
                <div class="family-list" id="fam-${p.זהות}"></div>
            `;
            resDiv.appendChild(card);
        });
    }

    function getFamily(myId, dad, mom, btn) {
        const box = document.getElementById(`fam-${myId}`);
        if(box.style.display === "block") { box.style.display = "none"; return; }

        let html = "";
        const p = db.exec(`SELECT פרטי, משפחה FROM people WHERE זהות='${dad}' OR זהות='${mom}'`);
        if(p[0]) html += "<b>👨‍👩‍👦 הורים:</b> " + p[0].values.map(v => v[0]+' '+v[1]).join(", ") + "<br>";
        
        const c = db.exec(`SELECT פרטי, משפחה FROM people WHERE מז_אב='${myId}' OR מז_אם='${myId}'`);
        if(c[0]) html += "<b>👶 ילדים:</b> " + c[0].values.map(v => v[0]+' '+v[1]).join(", ") + "<br>";

        const s = db.exec(`SELECT פרטי FROM people WHERE מז_אב='${dad}' AND זהות!='${myId}' AND מז_אב!='' LIMIT 5`);
        if(s[0]) html += "<b>👫 אחים:</b> " + s[0].values.map(v => v[0]).join(", ");

        box.innerHTML = html || "לא נמצאו קרובים במאגר";
        box.style.display = "block";
    }
</script>

</body>
</html>
