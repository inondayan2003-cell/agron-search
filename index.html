<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGRON SYSTEM - Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <style>
        :root {
            --bg: #05070a;
            --card: #11141b;
            --input: #1a1f26;
            --accent: #3b82f6;
            --text: #ffffff;
            --dim: #a0aec0;
            --border: #2d3748;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: radial-gradient(circle at top, #1a1f26 0%, #05070a 100%);
            background-attachment: fixed;
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }
        .header h1 { text-align: center; font-weight: 800; margin-bottom: 25px; color: #fff; }

        .search-card {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* תיקון אזור בחירת הקובץ */
        .file-upload-area {
            display: block;
            background: #1a1f26;
            border: 2px dashed var(--border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .file-upload-area:hover { border-color: var(--accent); background: #222933; }

        input[type="text"] {
            width: 100%; padding: 15px; background: var(--input);
            border: 1px solid transparent; border-radius: 12px;
            color: white; font-size: 16px; margin-bottom: 12px;
            box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .search-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; border: none; border-radius: 12px;
            font-size: 18px; font-weight: 700; cursor: pointer;
        }

        #status { text-align: center; font-size: 14px; margin: 10px 0; color: var(--accent); }
        #progress-container { display: none; width: 100%; background: #2d3748; height: 6px; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: 0.2s; }

        .result-card { background: #161b22; padding: 20px; border-radius: 18px; margin-top: 15px; border: 1px solid var(--border); }
        .res-name { font-size: 20px; font-weight: bold; }
        .fam-box { margin-top: 10px; }
        .mini-card { background: #0d1117; padding: 12px; border-radius: 10px; margin-top: 5px; border-right: 3px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>AGRON PERFECT</h1></div>

    <div class="search-card">
        <label for="dbFile" class="file-upload-area" id="dropZone">
            <span id="labelTxt">📁 לחץ כאן לבחירת קובץ ה-DB</span>
            <input type="file" id="dbFile" accept=".db" style="display:none" onchange="loadDB(this)">
        </label>

        <div id="status">ממתין לקובץ...</div>
        <div id="progress-container"><div id="progress-bar"></div></div>

        <input type="text" id="inID" placeholder="מספר זהות">
        <input type="text" id="inFN" placeholder="שם פרטי">
        <input type="text" id="inLN" placeholder="שם משפחה">
        <input type="text" id="inCity" placeholder="עיר">
        
        <button class="search-btn" onclick="doSearch()">חפש עכשיו</button>
    </div>

    <div id="results"></div>
</div>

<script>
    let db = null;

    async function loadDB(input) {
        const file = input.files[0];
        if (!file) return;

        const status = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const labelTxt = document.getElementById('labelTxt');

        progressContainer.style.display = 'block';
        status.innerText = "טוען קובץ...";
        labelTxt.innerText = "📄 " + file.name;

        try {
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
            const reader = new FileReader();

            reader.onprogress = (e) => {
                if (e.lengthComputable) {
                    const p = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = p + '%';
                    status.innerText = `טעינה: ${p}%`;
                }
            };

            reader.onload = async (e) => {
                try {
                    const uInt8Array = new Uint8Array(e.target.result);
                    db = new SQL.Database(uInt8Array);
                    status.innerText = "✅ המאגר נטען בהצלחה!";
                    status.style.color = "#10b981";
                } catch (err) {
                    status.innerText = "❌ שגיאה: הקובץ אינו פורמט SQLite תקין.";
                }
            };
            reader.readAsArrayBuffer(file);
        } catch (err) {
            status.innerText = "שגיאה בטעינה: " + err.message;
        }
    }

    function doSearch() {
        if (!db) { alert("קודם תטען את הקובץ!"); return; }
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "<p style='text-align:center'>מחפש...</p>";

        const id = document.getElementById('inID').value;
        const fn = document.getElementById('inFN').value;
        const ln = document.getElementById('inLN').value;
        const city = document.getElementById('inCity').value;

        let q = "SELECT * FROM people WHERE 1=1";
        if(id) q += ` AND זהות = '${id}'`;
        if(fn) q += ` AND פרטי LIKE '${fn}%'`;
        if(ln) q += ` AND משפחה LIKE '${ln}%'`;
        if(city) q += ` AND עיר LIKE '${city}%'`;
        q += " LIMIT 50";

        try {
            const res = db.exec(q);
            resDiv.innerHTML = "";
            if(!res[0]) { resDiv.innerHTML = "<p style='text-align:center'>אין תוצאות</p>"; return; }

            res[0].values.forEach(row => {
                let p = {};
                res[0].columns.forEach((c, i) => p[c] = row[i]);
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="res-name">${p.פרטי} ${p.משפחה}</div>
                    <div style="color:var(--dim); font-size:14px; margin-top:5px;">
                        🆔 ${p.זהות} | 📍 ${p.עיר} | 📅 ${p.תא_לידה}
                    </div>
                `;
                resDiv.appendChild(card);
            });
        } catch (e) {
            resDiv.innerHTML = "שגיאה בחיפוש.";
        }
    }
</script>
</body>
</html>
