<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGRON SYSTEM - Dark Family Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151921;
            --input: #1c222d;
            --text: #e1e1e1;
            --dim: #94a3b8;
            --accent: #3b82f6;
            --border: #2d3748;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }
        .header h1 { text-align: center; color: var(--accent); font-size: 24px; margin-bottom: 25px; letter-spacing: 1px; }

        .search-card {
            background: var(--card); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 12px; }
        input {
            width: 100%; padding: 14px; background: var(--input);
            border: 1px solid var(--border); border-radius: 10px;
            color: white; font-size: 16px; box-sizing: border-box; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: var(--accent); }

        button.search-btn {
            width: 100%; padding: 15px; background: var(--accent);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;
        }

        /* פס התקדמות */
        #progress-container {
            display: none; width: 100%; background: #1e293b;
            border-radius: 10px; height: 10px; margin: 15px 0; overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.1s; }

        .file-label {
            display: block; text-align: center; padding: 15px;
            background: #1e293b; border: 1px dashed var(--border);
            border-radius: 8px; margin-bottom: 15px; cursor: pointer;
            font-size: 14px; color: var(--dim);
        }

        #status { text-align: center; font-size: 13px; margin-bottom: 10px; color: var(--accent); min-height: 18px; }

        /* כרטיסיית תוצאה ראשית */
        .result-card {
            background: var(--card); padding: 18px; border-radius: 14px;
            border: 1px solid var(--border); margin-bottom: 15px;
            border-right: 4px solid var(--accent);
            animation: fadeIn 0.3s ease-out;
        }

        .res-name { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .res-detail { font-size: 14px; color: var(--dim); line-height: 1.6; }

        /* כפתור משפחה */
        .fam-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--accent); padding: 8px 16px; border-radius: 8px;
            font-size: 13px; margin-top: 12px; cursor: pointer; font-weight: 600;
        }

        /* תיבת משפחה */
        .fam-box {
            display: none; margin-top: 15px; padding: 10px;
            background: rgba(0,0,0,0.2); border-radius: 10px;
        }

        /* כרטיסיית בן משפחה קטנה */
        .mini-card {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px;
            margin-bottom: 10px; border-right: 3px solid var(--border);
        }
        .rel-label { font-size: 11px; color: var(--accent); font-weight: bold; margin-bottom: 3px; }
        .mini-name { font-size: 16px; font-weight: bold; color: #eee; }
        .mini-detail { font-size: 12px; color: var(--dim); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>AGRON PERFECT</h1></div>

    <div class="search-card">
        <label class="file-label" id="fileLabel">
            📁 לחץ לבחירת קובץ agron_perfect.db
            <input type="file" id="dbFile" accept=".db" style="display:none" onchange="loadDB(this)">
        </label>

        <div id="status">ממתין לטעינת מאגר...</div>
        <div id="progress-container"><div id="progress-bar"></div></div>

        <input type="text" id="inID" placeholder="מספר זהות">
        <input type="text" id="inFN" placeholder="שם פרטי">
        <input type="text" id="inLN" placeholder="שם משפחה">
        <input type="text" id="inCity" placeholder="עיר">
        
        <button class="search-btn" onclick="doSearch()">חפש עכשיו</button>
    </div>

    <div id="results"></div>
</div>

<script>
    let db = null;

    async function loadDB(input) {
        if (!input.files[0]) return;
        const file = input.files[0];
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        
        progressContainer.style.display = 'block';
        status.innerText = "מתחיל בטעינה...";

        try {
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
            const reader = new FileReader();

            reader.onprogress = (event) => {
                if (event.lengthComputable) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    requestAnimationFrame(() => {
                        progressBar.style.width = percent + '%';
                        status.innerText = `טעינה מהמכשיר: ${percent}%`;
                    });
                }
            };

            reader.onload = async (e) => {
                status.innerText = "מעבד נתונים... (נא להמתין)";
                progressBar.style.width = '100%';
                await new Promise(r => setTimeout(r, 200));

                try {
                    db = new SQL.Database(new Uint8Array(e.target.result));
                    status.innerText = "✅ המאגר מוכן לשימוש!";
                    progressBar.style.backgroundColor = "var(--success)";
                } catch (err) {
                    status.innerText = "שגיאה בעיבוד הקובץ.";
                }
            };
            reader.readAsArrayBuffer(file);
        } catch (e) {
            status.innerText = "שגיאה: " + e.message;
        }
    }

    function doSearch() {
        if (!db) { alert("יש לטעון קובץ תחילה"); return; }
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "<p style='text-align:center'>מחפש...</p>";

        const id = document.getElementById('inID').value;
        const fn = document.getElementById('inFN').value;
        const ln = document.getElementById('inLN').value;
        const city = document.getElementById('inCity').value;

        let q = "SELECT * FROM people WHERE 1=1";
        if(id) q += ` AND זהות = '${id}'`;
        if(fn) q += ` AND פרטי LIKE '${fn}%'`;
        if(ln) q += ` AND משפחה LIKE '${ln}%'`;
        if(city) q += ` AND עיר LIKE '${city}%'`;
        q += " LIMIT 50";

        try {
            const res = db.exec(q);
            resDiv.innerHTML = "";
            if(!res[0]) { resDiv.innerHTML = "<p style='text-align:center'>לא נמצאו תוצאות</p>"; return; }

            res[0].values.forEach(row => {
                let p = {};
                res[0].columns.forEach((c, i) => p[c] = row[i]);
                
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="res-name">${p.פרטי} ${p.משפחה}</div>
                    <div class="res-detail">
                        <b>ת.ז:</b> ${p.זהות} | <b>עיר:</b> ${p.עיר}<br>
                        <b>תאריך לידה:</b> ${p.תא_לידה}
                    </div>
                    <button class="fam-btn" onclick="showFamily('${p.זהות}', '${p.מז_אב}', '${p.מז_אם}', this)">הצג משפחה ▼</button>
                    <div class="fam-box" id="box-${p.זהות}"></div>
                `;
                resDiv.appendChild(card);
            });
        } catch (e) {
            resDiv.innerHTML = "שגיאה בחיפוש.";
        }
    }

    function showFamily(myId, dadId, momId, btn) {
        const box = document.getElementById(`box-${myId}`);
        if(box.style.display === "block") { 
            box.style.display = "none"; 
            btn.innerText = "הצג משפחה ▼";
            return; 
        }

        box.innerHTML = "<p style='text-align:center; font-size:12px;'>מחפש קרובים...</p>";
        box.style.display = "block";
        btn.innerText = "סגור משפחה ▲";

        let familyHtml = "";
        const createMini = (p, rel) => `
            <div class="mini-card">
                <div class="rel-label">${rel}</div>
                <div class="mini-name">${p.פרטי} ${p.משפחה}</div>
                <div class="mini-detail">ת.ז: ${p.זהות} | עיר: ${p.עיר}</div>
            </div>`;

        // הורים
        const parents = db.exec(`SELECT * FROM people WHERE זהות='${dadId}' OR זהות='${momId}'`);
        if(parents[0]) {
            parents[0].values.forEach(row => {
                let p = {}; parents[0].columns.forEach((c, i) => p[c] = row[i]);
                familyHtml += createMini(p, (p.זהות === dadId) ? "אבא" : "אמא");
            });
        }

        // אחים
        if(dadId && dadId !== '0') {
            const sibs = db.exec(`SELECT * FROM people WHERE מז_אב='${dadId}' AND זהות!='${myId}' LIMIT 10`);
            if(sibs[0]) {
                sibs[0].values.forEach(row => {
                    let p = {}; sibs[0].columns.forEach((c, i) => p[c] = row[i]);
                    familyHtml += createMini(p, "אח / אחות");
                });
            }
        }

        // ילדים
        const kids = db.exec(`SELECT * FROM people WHERE מז_אב='${myId}' OR מז_אם='${myId}'`);
        if(kids[0]) {
            kids[0].values.forEach(row => {
                let p = {}; kids[0].columns.forEach((c, i) => p[c] = row[i]);
                familyHtml += createMini(p, "ילד / ה");
            });
        }

        box.innerHTML = familyHtml || "<p style='text-align:center; color:var(--dim); font-size:12px;'>לא נמצאו קרובים</p>";
    }
</script>
</body>
</html>
