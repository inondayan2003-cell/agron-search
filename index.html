<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGRON SYSTEM - Family Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151921;
            --input: #1c222d;
            --text: #e1e1e1;
            --dim: #94a3b8;
            --accent: #3b82f6;
            --border: #2d3748;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 480px; }
        .header h1 { text-align: center; color: var(--accent); font-size: 22px; margin-bottom: 25px; }

        .search-card {
            background: var(--card); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        input {
            width: 100%; padding: 12px; background: var(--input);
            border: 1px solid var(--border); border-radius: 8px;
            color: white; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--accent); }

        button {
            width: 100%; padding: 14px; background: var(--accent);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }

        #progress-container {
            display: none; width: 100%; background: #1e293b;
            border-radius: 20px; height: 8px; margin: 15px 0; overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s; }

        #status { text-align: center; font-size: 13px; margin-bottom: 10px; color: var(--dim); }

        .result-card {
            background: var(--card); padding: 15px; border-radius: 12px;
            border: 1px solid var(--border); margin-bottom: 12px;
            border-right: 4px solid var(--accent);
        }

        .res-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .res-detail { font-size: 14px; color: var(--dim); line-height: 1.4; }

        .fam-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--accent); padding: 6px 12px; border-radius: 6px;
            font-size: 13px; margin-top: 10px; width: auto;
        }

        .fam-box {
            display: none; margin-top: 10px; padding: 10px;
            background: rgba(0,0,0,0.2); border-radius: 6px;
            font-size: 13px; border-top: 1px solid var(--border);
        }

        .fam-item { margin-bottom: 4px; }
        .fam-label { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>AGRON PERFECT</h1></div>

    <div class="search-card">
        <label style="display:block; text-align:center; padding:12px; background:#1e293b; border:1px dashed var(--border); border-radius:8px; margin-bottom:15px; cursor:pointer; font-size:14px;">
            📁 בחר קובץ agron_perfect.db
            <input type="file" id="dbFile" accept=".db" style="display:none" onchange="loadDB(this)">
        </label>

        <div id="status">ממתין לטעינת קובץ...</div>
        <div id="progress-container"><div id="progress-bar"></div></div>

        <input type="text" id="inID" placeholder="מספר זהות">
        <input type="text" id="inFN" placeholder="שם פרטי">
        <input type="text" id="inLN" placeholder="שם משפחה">
        <input type="text" id="inCity" placeholder="עיר">
        
        <button onclick="doSearch()">חפש</button>
    </div>

    <div id="results"></div>
</div>

<script>
    let db = null;

    async function loadDB(input) {
        if (!input.files[0]) return;
        const file = input.files[0];
        const status = document.getElementById('status');
        const pBar = document.getElementById('progress-bar');
        const pCont = document.getElementById('progress-container');
        
        pCont.style.display = 'block';
        const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
        const reader = new FileReader();

        reader.onprogress = (e) => {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                requestAnimationFrame(() => {
                    pBar.style.width = percent + '%';
                    status.innerText = `טעינה: ${percent}%`;
                });
            }
        };

        reader.onload = e => {
            status.innerText = "מעבד נתונים... (נא להמתין)";
            setTimeout(() => {
                db = new SQL.Database(new Uint8Array(e.target.result));
                status.innerText = "✅ המאגר מוכן לשימוש!";
                pBar.style.background = "var(--success)";
            }, 100);
        };
        reader.readAsArrayBuffer(file);
    }

    function doSearch() {
        if (!db) return;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "<p style='text-align:center'>מחפש...</p>";

        const id = document.getElementById('inID').value;
        const fn = document.getElementById('inFN').value;
        const ln = document.getElementById('inLN').value;
        const city = document.getElementById('inCity').value;

        let q = "SELECT * FROM people WHERE 1=1";
        if(id) q += ` AND זהות = '${id}'`;
        if(fn) q += ` AND פרטי LIKE '${fn}%'`;
        if(ln) q += ` AND משפחה LIKE '${ln}%'`;
        if(city) q += ` AND עיר LIKE '${city}%'`;
        q += " LIMIT 50";

        const res = db.exec(q);
        resDiv.innerHTML = "";
        if(!res[0]) { resDiv.innerHTML = "אין תוצאות"; return; }

        res[0].values.forEach(row => {
            let p = {};
            res[0].columns.forEach((c, i) => p[c] = row[i]);
            
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="res-name">${p.פרטי} ${p.משפחה}</div>
                <div class="res-detail">
                    <b>ת.ז:</b> ${p.זהות} | <b>עיר:</b> ${p.עיר}<br>
                    <b>ת. לידה:</b> ${p.תא_לידה}
                </div>
                <button class="fam-btn" onclick="showFamily('${p.זהות}', '${p.מז_אב}', '${p.מז_אם}', this)">משפחה ▼</button>
                <div class="fam-box" id="box-${p.זהות}"></div>
            `;
            resDiv.appendChild(card);
        });
    }
     function showFamily(myId, dadId, momId, btn) {
    const box = document.getElementById(`box-${myId}`);
    
    // אם התיבה כבר פתוחה - סגור אותה
    if(box.style.display === "block") { 
        box.style.display = "none"; 
        return; 
    }

    box.innerHTML = "<p style='text-align:center; color:var(--accent);'>מחפש קרובים...</p>";
    box.style.display = "block";

    let familyCards = "";

    // פונקציית עזר ליצירת כרטיסייה קטנה ומעוצבת לבן משפחה
    const createMiniCard = (person, relation) => {
        return `
            <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; border-right: 3px solid #555;">
                <div style="font-size: 11px; color: var(--accent); font-weight: bold; text-transform: uppercase;">${relation}</div>
                <div style="font-weight: bold; font-size: 15px;">${person.פרטי} ${person.משפחה}</div>
                <div style="font-size: 13px; color: var(--dim);">
                    ת.ז: ${person.זהות} | עיר: ${person.עיר}
                </div>
            </div>
        `;
    };

    // 1. חיפוש הורים
    const parents = db.exec(`SELECT * FROM people WHERE זהות='${dadId}' OR זהות='${momId}'`);
    if(parents[0]) {
        parents[0].values.forEach(row => {
            let p = {};
            parents[0].columns.forEach((c, i) => p[c] = row[i]);
            const relation = (p.זהות === dadId) ? "אבא" : "אמא";
            familyCards += createMiniCard(p, relation);
        });
    }

    // 2. חיפוש אחים (לפי אבא)
    if(dadId && dadId !== '0') {
        const siblings = db.exec(`SELECT * FROM people WHERE מז_אב='${dadId}' AND זהות!='${myId}' LIMIT 15`);
        if(siblings[0]) {
            siblings[0].values.forEach(row => {
                let p = {};
                siblings[0].columns.forEach((c, i) => p[c] = row[i]);
                familyCards += createMiniCard(p, "אח/אחות");
            });
        }
    }

    // 3. חיפוש ילדים
    const kids = db.exec(`SELECT * FROM people WHERE מז_אב='${myId}' OR מז_אם='${myId}' LIMIT 15`);
    if(kids[0]) {
        kids[0].values.forEach(row => {
            let p = {};
            kids[0].columns.forEach((c, i) => p[c] = row[i]);
            familyCards += createMiniCard(p, "ילד/ה");
        });
    }

    // הצגת התוצאות
    if (familyCards === "") {
        box.innerHTML = "<div style='text-align:center; padding: 10px; color: var(--dim);'>לא נמצאו קרובים במאגר</div>";
    } else {
        box.innerHTML = familyCards;
    }
}
     


        box.innerHTML = html || "לא נמצאו קרובים";
        box.style.display = "block";
    }
</script>

</body>
</html>
