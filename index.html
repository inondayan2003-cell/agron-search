<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGRON Dark System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151921;
            --input-bg: #1c222d;
            --text-main: #e1e1e1;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #2d3748;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }
        .header h1 { text-align: center; color: var(--accent); font-size: 24px; margin-bottom: 30px; }

        .search-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .input-group { margin-bottom: 12px; }
        input {
            width: 100%; padding: 14px; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 10px;
            color: white; font-size: 16px; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 15px; background: var(--accent);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }

        /* פס התקדמות */
        #progress-container {
            display: none; width: 100%; background: #1e293b;
            border-radius: 10px; height: 10px; margin: 15px 0; overflow: hidden;
        }
        #progress-bar {
            width: 0%; height: 100%; background: var(--accent);
            box-shadow: 0 0 10px var(--accent); transition: width 0.2s;
        }

        .file-label {
            display: block; text-align: center; padding: 15px;
            background: #1e293b; border: 1px dashed var(--border);
            border-radius: 8px; margin-bottom: 15px; cursor: pointer;
            font-size: 14px; color: var(--text-dim);
        }

        .result-card {
            background: var(--card-bg); padding: 18px; border-radius: 14px;
            border: 1px solid var(--border); margin-bottom: 15px;
        }

        #status { text-align: center; font-size: 13px; margin-bottom: 5px; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>AGRON SYSTEM</h1></div>

    <div class="search-card">
        <label class="file-label" id="fileLabel">
            📁 לחץ לבחירת קובץ agron.db
            <input type="file" id="dbFile" accept=".db" style="display:none" onchange="loadDB(this)">
        </label>

        <div id="status">ממתין לבחירת קובץ...</div>
        
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div class="input-group"><input type="text" id="inID" placeholder="מספר זהות"></div>
        <div class="input-group"><input type="text" id="inFN" placeholder="שם פרטי"></div>
        <div class="input-group"><input type="text" id="inLN" placeholder="שם משפחה"></div>
        <div class="input-group"><input type="text" id="inCity" placeholder="עיר"></div>
        
        <button onclick="doSearch()">חפש עכשיו</button>
    </div>

    <div id="results"></div>
</div>

<script>
    let db = null;

    async function loadDB(input) {
        if (!input.files[0]) return;
        const file = input.files[0];
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        
        progressContainer.style.display = 'block';
        status.innerText = "קורא קובץ: 0%";

        try {
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
            const reader = new FileReader();

            // עדכון אחוזים בזמן אמת
            reader.onprogress = function(event) {
                if (event.lengthComputable) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    progressBar.style.width = percent + '%';
                    status.innerText = `קורא קובץ מהמכשיר: ${percent}%`;
                }
            };

            reader.onload = function() {
                status.innerText = "מעבד נתונים... (זה השלב הכי כבד)";
                setTimeout(() => {
                    try {
                        db = new SQL.Database(new Uint8Array(reader.result));
                        status.innerText = "✅ המאגר מוכן לחיפוש!";
                        progressBar.style.backgroundColor = "#10b981"; // צבע ירוק כשסיים
                    } catch (e) {
                        status.innerText = "שגיאה בעיבוד ה-DB. אולי הקובץ פגום?";
                    }
                }, 100);
            };

            reader.readAsArrayBuffer(file);
        } catch (e) {
            status.innerText = "שגיאה בטעינה: " + e.message;
        }
    }

    function doSearch() {
        if (!db) { alert("טען קודם את הקובץ"); return; }
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "<p style='text-align:center'>מחפש...</p>";

        const id = document.getElementById('inID').value;
        const fn = document.getElementById('inFN').value;
        const ln = document.getElementById('inLN').value;
        const city = document.getElementById('inCity').value;

        let q = "SELECT * FROM people WHERE 1=1";
        if(id) q += ` AND זהות = '${id}'`;
        if(fn) q += ` AND פרטי LIKE '${fn}%'`;
        if(ln) q += ` AND משפחה LIKE '${ln}%'`;
        if(city) q += ` AND עיר LIKE '${city}%'`;
        q += " LIMIT 50";

        try {
            const res = db.exec(q);
            resDiv.innerHTML = "";
            if(!res[0]) { resDiv.innerHTML = "<p style='text-align:center'>לא נמצאו תוצאות</p>"; return; }

            res[0].values.forEach(row => {
                let p = {};
                res[0].columns.forEach((c, i) => p[c] = row[i]);
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div style="font-weight:bold; font-size:18px;">${p.פרטי} ${p.משפחה}</div>
                    <div style="color:var(--text-dim); font-size:14px; margin-top:5px;">
                        ת.ז: ${p.זהות} | עיר: ${p.עיר} | לידה: ${p.שנה}
                    </div>
                `;
                resDiv.appendChild(card);
            });
        } catch (e) {
            resDiv.innerHTML = "שגיאה בחיפוש: " + e.message;
        }
    }
</script>
</body>
</html>
