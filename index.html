<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGRON FTS5 - Ultra Fast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root {
            --bg: #05070a;
            --card: #11141b;
            --input: #1a1f26;
            --accent: #3b82f6;
            --text: #ffffff;
            --dim: #a0aec0;
            --border: #2d3748;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #05070a 100%);
            background-attachment: fixed;
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 480px; }
        .header h1 { text-align: center; font-weight: 900; background: linear-gradient(#fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }

        .search-card {
            background: var(--card); padding: 25px; border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        input {
            width: 100%; padding: 16px; background: var(--input);
            border: 1px solid transparent; border-radius: 14px;
            color: white; font-size: 16px; margin-bottom: 12px; box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        .search-btn {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer;
        }

        #progress-container { display: none; width: 100%; background: #1e293b; border-radius: 10px; height: 6px; margin: 15px 0; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: 0.3s; }

        .result-card { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 15px; border: 1px solid var(--border); border-right: 4px solid var(--accent); }
        .res-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        
        .fam-btn { width: 100%; background: rgba(255,255,255,0.05); color: var(--accent); border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        
        .mini-card { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; margin-top: 8px; border-right: 3px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>AGRON FTS5</h1></div>
    <div class="search-card">
        <label style="display:block; text-align:center; padding:15px; border:1px dashed var(--border); border-radius:12px; cursor:pointer; margin-bottom:15px;">
            📁 טען קובץ FTS5
            <input type="file" id="dbFile" accept=".db" style="display:none" onchange="loadDB(this)">
        </label>
        <div id="status" style="text-align:center; font-size:13px; color:var(--accent);"></div>
        <div id="progress-container"><div id="progress-bar"></div></div>

        <input type="text" id="inID" placeholder="תעודת זהות">
        <input type="text" id="inFN" placeholder="שם פרטי">
        <input type="text" id="inLN" placeholder="שם משפחה">
        <input type="text" id="inCity" placeholder="עיר">
        <button class="search-btn" onclick="doSearch()">חיפוש מהיר 🔥</button>
    </div>
    <div id="results"></div>
</div>

<script>
    let db = null;

    async function loadDB(input) {
        if (!input.files[0]) return;
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        document.getElementById('progress-container').style.display = 'block';

        const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
        const reader = new FileReader();

        reader.onprogress = e => {
            let p = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = p + '%';
            status.innerText = `טוען: ${p}%`;
        };

        reader.onload = e => {
            db = new SQL.Database(new Uint8Array(e.target.result));
            status.innerText = "✅ המנוע מוכן!";
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    function doSearch() {
        if (!db) return;
        const id = document.getElementById('inID').value;
        const fn = document.getElementById('inFN').value;
        const ln = document.getElementById('inLN').value;
        const city = document.getElementById('inCity').value;

        let terms = [];
        if(id) terms.push(`זהות:${id}`);
        if(fn) terms.push(`פרטי:${fn}*`);
        if(ln) terms.push(`משפחה:${ln}*`);
        if(city) terms.push(`עיר:${city}*`);

        if(terms.length === 0) return;

        const q = `SELECT * FROM people WHERE people MATCH '${terms.join(' AND ')}' LIMIT 50`;
        const res = db.exec(q);
        
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "";

        if(res[0]) {
            res[0].values.forEach(row => {
                let p = {}; res[0].columns.forEach((c, i) => p[c] = row[i]);
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="res-name">👤 ${p.פרטי} ${p.משפחה}</div>
                    <div style="font-size:14px; color:var(--dim)">🆔 ${p.זהות} | 📍 ${p.עיר} | 📅 ${p.תא_לידה}</div>
                    <button class="fam-btn" onclick="showFamily('${p.זהות}', '${p.מז_אב}', '${p.מז_אם}', this)">משפחה ▼</button>
                    <div id="box-${p.זהות}" style="display:none"></div>
                `;
                resDiv.appendChild(card);
            });
        }
    }

    function showFamily(myId, dadId, momId, btn) {
        const box = document.getElementById(`box-${myId}`);
        if(box.style.display === "block") { box.style.display = "none"; return; }

        let familyHtml = "";
        const createMini = (p, rel) => `
            <div class="mini-card">
                <div style="font-size:11px; color:var(--accent); font-weight:bold">${rel}</div>
                <div style="font-weight:bold">${p.פרטי} ${p.משפחה}</div>
                <div style="font-size:12px; color:var(--dim)">🆔 ${p.זהות} | 📍 ${p.עיר}</div>
            </div>`;

        // ב-FTS5 אנחנו מחפשים הורים לפי זהות (MATCH)
        const parents = db.exec(`SELECT * FROM people WHERE people MATCH 'זהות:${dadId} OR זהות:${momId}'`);
        if(parents[0]) {
            parents[0].values.forEach(row => {
                let p = {}; parents[0].columns.forEach((c, i) => p[c] = row[i]);
                familyHtml += createMini(p, p.זהות === dadId ? "אבא" : "אמא");
            });
        }

        // חיפוש אחים
        if(dadId && dadId !== '0') {
            const sibs = db.exec(`SELECT * FROM people WHERE people MATCH 'מז_אב:${dadId}' AND זהות!='${myId}' LIMIT 10`);
            if(sibs[0]) {
                sibs[0].values.forEach(row => {
                    let p = {}; sibs[0].columns.forEach((c, i) => p[c] = row[i]);
                    familyHtml += createMini(p, "אח / אחות");
                });
            }
        }

        box.innerHTML = familyHtml || "לא נמצאו קרובים";
        box.style.display = "block";
    }
</script>
</body>
</html>
